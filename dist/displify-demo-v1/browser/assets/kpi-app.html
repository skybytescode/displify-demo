<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KPI App</title>
  <style>
    /* ── Reset & base ─────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f4f8;
      padding: 24px;
      color: #1e1e2f;
    }

    /* ── Header ───────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .header h1 {
      font-size: 1.2rem;
      font-weight: 600;
    }

    .badge {
      font-size: 0.7rem;
      padding: 3px 8px;
      border-radius: 3px;
      background: #e0e7ff;
      color: #4338ca;
      letter-spacing: 0.5px;
    }

    /* ── Card grid ────────────────────────────── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .kpi-card {
      background: #ffffff;
      border: 2px solid transparent;
      border-radius: 12px;
      padding: 24px 20px;
      cursor: pointer;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      transition: transform 200ms ease, border-color 200ms ease, box-shadow 200ms ease;
    }

    .kpi-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.10);
      border-color: #6366f1;
    }

    .kpi-card.selected {
      border-color: #6366f1;
      background: #eef2ff;
    }

    .kpi-card .value {
      font-size: 2.2rem;
      font-weight: 700;
      color: #4338ca;
      line-height: 1;
    }

    .kpi-card .label {
      margin-top: 8px;
      font-size: 0.85rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .kpi-card .unit {
      font-size: 0.95rem;
      color: #94a3b8;
      margin-left: 2px;
    }

    /* ── Status log ───────────────────────────── */
    .status-bar {
      margin-bottom: 16px;
      padding: 10px 14px;
      border-radius: 6px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      font-size: 0.8rem;
      color: #64748b;
      min-height: 38px;
    }

    /* ── Crash button ─────────────────────────── */
    .btn-crash {
      padding: 8px 18px;
      font-size: 0.8rem;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      background: #ef4444;
      color: #fff;
      cursor: pointer;
      transition: background 200ms ease;
    }

    .btn-crash:hover {
      background: #dc2626;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>📊 KPI Dashboard</h1>
    <span class="badge">MICRO-APP</span>
  </div>

  <div id="status" class="status-bar">Click a KPI card to notify the Shell…</div>

  <div class="card-grid">
    <!-- Cards are rendered by JS below -->
  </div>

  <button class="btn-crash" onclick="simulateCrash()">💥 Simulate Crash</button>

  <script>
    // ─────────────────────────────────────────────
    //  Heartbeat kill flag
    // ─────────────────────────────────────────────
    let killed = false;

    // ─────────────────────────────────────────────
    //  KPI data
    // ─────────────────────────────────────────────
    const kpis = [
      { id: 'sme',       label: 'SME Score',       value: 94,  unit: '%' },
      { id: 'revenue',   label: 'Revenue',         value: 1.2, unit: 'M' },
      { id: 'churn',     label: 'Churn Rate',      value: 3.7, unit: '%' },
    ];

    // ─────────────────────────────────────────────
    //  Render cards
    // ─────────────────────────────────────────────
    const grid = document.querySelector('.card-grid');

    kpis.forEach((kpi) => {
      const card = document.createElement('div');
      card.className = 'kpi-card';
      card.dataset.id = kpi.id;
      card.innerHTML = `
        <div class="value">${kpi.value}<span class="unit">${kpi.unit}</span></div>
        <div class="label">${kpi.label}</div>
      `;
      card.addEventListener('click', () => selectKpi(kpi, card));
      grid.appendChild(card);
    });

    // ─────────────────────────────────────────────
    //  Card click → postMessage to Shell
    //  First click  = KPI_SELECTED (highlight + data)
    //  Second click on same card = KPI_FOCUSED (fullscreen)
    // ─────────────────────────────────────────────
    let currentSelectedId = null;

    function selectKpi(kpi, cardEl) {
      const isAlreadySelected = (currentSelectedId === kpi.id);

      // Visual feedback
      document.querySelectorAll('.kpi-card').forEach(c => c.classList.remove('selected'));
      cardEl.classList.add('selected');

      const messageType = isAlreadySelected ? 'KPI_FOCUSED' : 'KPI_SELECTED';
      currentSelectedId = kpi.id;

      const message = {
        type:    messageType,
        target:  'SHELL',
        payload: { id: kpi.id, value: kpi.value },
      };

      window.parent.postMessage(message, '*');

      const label = isAlreadySelected
        ? `🔍 Sent KPI_FOCUSED (double-select) → id: "${kpi.id}"`
        : `✅ Sent KPI_SELECTED → id: "${kpi.id}", value: ${kpi.value}`;
      setStatus(label);
      console.log('[KPI App] postMessage sent:', message);
    }

    // ─────────────────────────────────────────────
    //  Inbound messages from Shell
    // ─────────────────────────────────────────────
    window.addEventListener('message', (event) => {
      const data = event.data;
      if (!data || !data.type) return;

      // ── Heartbeat: respond to PING with PONG ──
      if (data.type === 'PING') {
        if (!killed) {
          window.parent.postMessage(
            { type: 'PONG', target: 'SHELL', payload: { app: 'KPI_APP', ts: Date.now() } },
            '*',
          );
        }
        return; // silent — don't log PINGs
      }

      // ── KILL: stop responding to PINGs ──
      if (data.type === 'KILL') {
        killed = true;
        console.error('[KPI App] KILL received — stopped responding to PINGs');
        setStatus('☠️ KILL received — app is dead (ignoring heartbeats)');
        document.body.style.opacity = '0.4';
        document.body.style.pointerEvents = 'none';
        return;
      }

      console.log('[KPI App] Message received:', data);

      if (data.type === 'DATA_UPDATE' && data.target === 'KPI_APP') {
        setStatus(`📨 Shell says: ${JSON.stringify(data.payload)}`);
      }
    });

    // ─────────────────────────────────────────────
    //  Crash simulation
    // ─────────────────────────────────────────────
    function simulateCrash() {
      setStatus('💥 Crashing… (reloading page)');

      // Notify the shell before reloading
      window.parent.postMessage(
        { type: 'CRASH_SIMULATION', target: 'SHELL', payload: { app: 'KPI_APP' } },
        '*',
      );

      setTimeout(() => location.reload(), 300);
    }

    // ─────────────────────────────────────────────
    //  Helpers
    // ─────────────────────────────────────────────
    function setStatus(text) {
      document.getElementById('status').textContent = text;
    }
  </script>
</body>
</html>
